application:
  bindAddress: :8446
  production : false
  debug      : false
database:
  address : algotiqa-server:3402
  name    : collector
  username: admin
  password: admin
authentication:
  authority   : https://algotiqa-server:8443/auth/realms/algotiqa
  clientId    : algotiqa-backend
  clientSecret: PUT_YOUR_KEY_HERE
platform:
  system: https://algotiqa-server:8449/api/system
messaging:
  address : algotiqa-server:8450
  username: admin
  password: admin
  journal:
    directory      : journal
    queueSize      : 1000
    compactMessages: 1000
    dbSpoolInterval: 2
datastore:
  address : algotiqa-server:3410
  name    : datastore
  username: admin
  password: admin
  staging : staging
